<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1e1e1e; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #2c2c2e; padding: 25px; border-radius: 16px; width: 85%; max-width: 320px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); text-align: center; }
        h2 { margin-top: 0; font-size: 22px; margin-bottom: 20px; }
        .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 15px; box-sizing: border-box; }
        .btn-vk { background: #0077ff; color: #fff; text-decoration: none; }
        .btn-send { background: #ffcc00; color: #000; }
        input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #444; background: #1c1c1e; color: #fff; font-size: 15px; margin-bottom: 15px; box-sizing: border-box; }
        p { font-size: 14px; color: #aaa; margin-bottom: 10px; font-weight: bold; }
        .hint { font-size: 12px; color: #888; margin-top: -10px; margin-bottom: 15px; font-weight: normal;}
        hr { border: none; border-top: 1px solid #444; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Music Porter 🎵</h2>
        
        <p>Шаг 1: Получи токен</p>
        <button id="auth-btn" class="btn btn-vk" onclick="openVK()">Авторизовать VK</button>
        <div class="hint">Откроется браузер. Скопируй ссылку из верхней строки и отправь боту!</div>

        <hr>
        
        <p>Шаг 2: Вставь ссылку</p>
        <input type="text" id="yandex-link" placeholder="Ссылка на плейлист Яндекс">
        <button class="btn btn-send" onclick="sendToBot()">Начать перенос</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function openVK() {
            // Возвращаем надежный blank.html
            const vkUrl = "https://oauth.vk.com/authorize?client_id=6121396&scope=audio,offline&response_type=token&redirect_uri=https://oauth.vk.com/blank.html";
            
            // МАГИЯ: Заставляем Telegram открыть ссылку во внешнем браузере телефона!
            tg.openLink(vkUrl); 
        }

        function sendToBot() {
            const val = document.getElementById('yandex-link').value;
            if (val) { 
                tg.sendData(val); 
                tg.close(); 
            } else {
                alert("Сначала вставь ссылку!");
            }
        }
    </script>
</body>
</html>
