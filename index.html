<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #2b2b2b; padding: 20px; border-radius: 15px; width: 100%; max-width: 300px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; }
        input { width: 90%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #444; background: #333; color: white; }
        .btn-vk { background: #0077ff; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 10px; }
        .btn-start { background: #ffcc00; color: black; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        h2 { margin-top: 0; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Music Porter 🎵</h2>
        
        <button class="btn-vk" onclick="authVK()">1. Авторизовать VK</button>
        
        <input type="text" id="yandex-link" placeholder="Ссылка на плейлист Яндекса">
        
        <button class="btn-start" onclick="sendData()">2. Начать перенос</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function authVK() {
            // Ссылка на авторизацию (замени YOUR_VK_APP_ID на свой ID приложения VK)
            const vkUrl = "https://id.vk.com/auth?return_auth_hash=b86d3a0b91eb55a266&redirect_uri=https%3A%2F%2Foauth.vk.com%2Fblank.html&redirect_uri_hash=de15a1510dedc1b07c&force_hash=1&app_id=6121396&response_type=token&code_challenge=&code_challenge_method=&scope=65544&state=";
            window.open(vkUrl, '_blank');
            alert("После авторизации скопируй URL страницы и пришли его боту в чат!");
        }

        function sendData() {
            const link = document.getElementById('yandex-link').value;
            if (!link) return alert("Вставь ссылку!");
            
            // Отправляем ссылку боту в чат
            tg.sendData(link);
            tg.close();
        }
    </script>
</body>
</html>
