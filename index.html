<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Porter</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1c1c1e; color: white; font-family: -apple-system, sans-serif; text-align: center; padding: 20px; }
        .card { background: #2c2c2e; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .btn { display: block; width: 100%; padding: 16px; margin: 12px 0; border-radius: 12px; border: none; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn-vk { background: #007aff; color: white; }
        .btn-start { background: #34c759; color: white; margin-top: 20px; }
        input { width: 100%; padding: 14px; margin: 12px 0; border-radius: 10px; border: 1px solid #444; background: #1c1c1e; color: white; box-sizing: border-box; font-size: 15px; }
        h3 { margin-top: 0; color: #fff; }
        p { font-size: 13px; color: #999; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="card">
        <h3>1️⃣ Шаг: Доступ к ВК</h3>
        <p>Нажми кнопку, нажми «Разрешить» и скопируй адрес итоговой страницы обратно в чат боту.</p>
        <button class="btn btn-vk" onclick="authVK()">Авторизовать ВК</button>
    </div>

    <div class="card">
        <h3>2️⃣ Шаг: Ссылка на музыку</h3>
        <p>Вставь ссылку на <b>открытый</b> плейлист Яндекса:</p>
        <input type="text" id="playlist_url" placeholder="https://music.yandex.ru/users/...">
        <button class="btn btn-start" onclick="sendPlaylist()">Начать перенос 🚀</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function authVK() {
            const url = "https://oauth.vk.com/authorize?client_id=6121396&scope=audio,offline&response_type=token&redirect_uri=https://oauth.vk.com/blank.html";
            tg.openLink(url);
        }

        function sendPlaylist() {
            const url = document.getElementById('playlist_url').value;
            if (url && url.includes('music.yandex')) {
                tg.sendData(url);
                tg.close();
            } else {
                alert("Пожалуйста, вставь правильную ссылку на плейлист!");
            }
        }
    </script>
</body>
</html>
