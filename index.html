<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Porter</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1c1c1e; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #2c2c2e; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-vk { background: #007aff; color: white; }
        .btn-ya { background: #ffcc00; color: black; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #1c1c1e; color: white; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="card">
        <h3>🔑 Авторизация</h3>
        <button class="btn btn-vk" onclick="auth('vk')">Войти в VK</button>
        <button class="btn btn-ya" onclick="auth('ya')">Войти в Яндекс</button>
        <p style="font-size: 12px; opacity: 0.6;">Разреши доступ и пришли ссылку из адресной строки боту</p>
    </div>

    <div class="card">
        <h3>🎵 Ссылка на плейлист</h3>
        <input type="text" id="playlist_url" placeholder="https://music.yandex.ru/...">
        <button class="btn" style="background: #34c759; color: white;" onclick="sendPlaylist()">Начать перенос</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function auth(platform) {
            let url = "";
            if (platform === 'vk') {
                url = "https://oauth.vk.com/authorize?client_id=6121396&scope=audio,offline&response_type=token&redirect_uri=https://oauth.vk.com/blank.html";
            } else {
                // НОВЫЙ ID (от официального Desktop-приложения Яндекса)
                url = "https://oauth.yandex.ru/authorize?response_type=token&client_id=246a3237937344939768c8716b9b1836";
            }
            tg.openLink(url);
        }

        function sendPlaylist() {
            const url = document.getElementById('playlist_url').value;
            if (url) { tg.sendData(url); tg.close(); }
        }
    </script>
</body>
</html>
