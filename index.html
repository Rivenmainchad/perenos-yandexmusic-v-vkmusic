<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-theme-bg: #1c1c1e; --tg-theme-text: #ffffff; --tg-theme-button: #007aff; }
        body { background: var(--tg-theme-bg); color: var(--tg-theme-text); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        .step { background: #2c2c2e; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h2 { font-size: 20px; margin-bottom: 10px; color: #ffcc00; }
        p { font-size: 14px; opacity: 0.8; margin-bottom: 15px; }
        .btn { display: block; width: 100%; padding: 15px; border-radius: 10px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; text-decoration: none; }
        .btn-vk { background: #0077ff; color: white; }
        .btn-copy { background: #34c759; color: white; display: none; }
        .btn-main { background: #ffcc00; color: black; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #1c1c1e; color: white; box-sizing: border-box; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="step" id="step1">
            <h2>Шаг 1: VK</h2>
            <p>Нажми кнопку, разреши доступ, а затем нажми «СКОПИРОВАТЬ» на этой же странице.</p>
            <button id="auth-btn" class="btn btn-vk" onclick="startAuth()">Авторизовать VK</button>
            <button id="copy-btn" class="btn btn-copy" onclick="doCopy()">📋 СКОПИРОВАТЬ ТОКЕН</button>
        </div>

        <div class="step">
            <h2>Шаг 2: Яндекс</h2>
            <input type="text" id="y-link" placeholder="Ссылка на плейлист">
            <button class="btn btn-main" onclick="sendToBot()">Начать перенос 🚀</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Ссылка на твой GitHub
        const myUrl = "https://rivenmainchad.github.io/perenos-yandexmusic-v-vkmusic/";

       function startAuth() {
    // Используем blank.html, чтобы не было ошибки redirect_uri
    const vkUrl = "https://oauth.vk.com/authorize?client_id=6121396&scope=audio,offline&response_type=token&redirect_uri=https://oauth.vk.com/blank.html";
    
    // Открываем через специальный метод Telegram, чтобы ссылка не "терялась" во внешних браузерах
    tg.openLink(vkUrl);
    
    // Сразу показываем инструкцию пользователю
    alert("1. В открывшемся окне нажми 'Разрешить'.\n2. Тебя перекинет на белую страницу.\n3. Скопируй ВЕСЬ адрес этой страницы из строки браузера и пришли его боту в чат!");
}
        }

        // Проверяем, вернулись ли мы с токеном
        if (window.location.hash.includes('access_token')) {
            const token = window.location.hash.split('access_token=')[1].split('&')[0];
            document.getElementById('auth-btn').style.display = 'none';
            const copyBtn = document.getElementById('copy-btn');
            copyBtn.style.display = 'block';
            copyBtn.dataset.token = token;
            tg.HapticFeedback.notificationOccurred('success');
        }

        function doCopy() {
            const token = document.getElementById('copy-btn').dataset.token;
            // Пытаемся скопировать
            const el = document.createElement('textarea');
            el.value = token;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            alert("Токен в буфере! Теперь просто вставь его боту.");
            tg.close();
        }

        function sendToBot() {
            const link = document.getElementById('y-link').value;
            if (link) { tg.sendData(link); tg.close(); }
        }
    </script>
</body>
</html>
